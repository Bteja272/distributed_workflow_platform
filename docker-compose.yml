version: "3.9"

services:
  api:
    build: .
    container_name: workflow_api
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  worker:
    build: .
    container_name: workflow_worker
    command: celery -A app.core.celery_app worker --pool=solo --loglevel=info
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - .:/app

  redis:
    image: redis:7
    container_name: workflow_redis
    ports:
      - "6379:6379"

  db:
    image: postgres:16
    container_name: workflow_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distributed_workflow_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: